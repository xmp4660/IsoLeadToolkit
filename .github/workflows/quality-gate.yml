name: Quality Gate

on:
  push:
    branches:
      - dev
      - master
      - epic/**
  pull_request:

jobs:
  test-and-guard:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas

      - name: Run smoke tests
        run: pytest

      - name: Check app_state direct assignments
        run: python scripts/check_state_mutations.py --fail-on-hits
